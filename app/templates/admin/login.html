{% extends "base.html" %}

{% block title %}Admin Login -- Missouri Topsoil Co.{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh] px-4">
  <div class="w-full max-w-sm bg-white rounded-lg shadow-md p-8">
    <h1 class="text-2xl font-bold text-center mb-6" style="color: var(--color-primary);">
      Admin Login
    </h1>

    <form method="POST" action="{{ url_for('admin.login') }}" class="space-y-5">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div>
        <label for="username" class="block text-sm font-medium mb-1" style="color: var(--color-text);">
          Username
        </label>
        <input
          type="text"
          id="username"
          name="username"
          required
          autocomplete="username"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent text-sm"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium mb-1" style="color: var(--color-text);">
          Password
        </label>
        <input
          type="password"
          id="password"
          name="password"
          required
          autocomplete="current-password"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent text-sm"
        />
      </div>

      <button
        type="submit"
        class="w-full py-2.5 rounded-md text-white font-medium text-sm transition-colors hover:opacity-90 focus-visible:opacity-90 transition-opacity"
        style="background-color: var(--color-secondary);"
      >
        Log In
      </button>
    </form>

    <p class="mt-6 text-center text-xs text-gray-500">
      <a href="{{ url_for('main.home') }}" class="hover:underline" style="color: var(--color-primary);">
        &larr; Back to site
      </a>
    </p>
  </div>
</div>
{% endblock %}
